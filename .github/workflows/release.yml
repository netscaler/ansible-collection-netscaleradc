---
name: Release the ansible collection to Ansible Galaxy and Ansible Automation Hub
on:
  release:
    types: [published]
permissions: read-all
jobs:
  release:
    permissions:
      contents: write
    uses: ansible/team-devtools/.github/workflows/release_collection.yml@84807a505faaf826f9a26c2528d5bb0a5950b6fa  # main
    with:
      environment: release
    secrets:
      ah_token: ${{ secrets.AH_TOKEN }}
      ansible_galaxy_api_key: ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
