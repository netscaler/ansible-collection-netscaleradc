---
name: Release the ansible collection to Ansible Galaxy and Ansible Automation Hub
on:
  release:
    types: [published]
permissions: read-all
jobs:
  release:
    permissions:
      contents: write
    uses: ansible/team-devtools/.github/workflows/release_collection.yml@e7604b7f0f487584a2264c09a0df1524fe2be49e  # main
    with:
      environment: release
    secrets:
      ah_token: ${{ secrets.AH_TOKEN }}
      ansible_galaxy_api_key: ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
